<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Edward King Portfolio Preview</title>
  <desc id="desc">Stylized EK initials on a dark gradient background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050709"/>
      <stop offset="100%" stop-color="#0c1f22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5ea9b1"/>
      <stop offset="100%" stop-color="#8fd2d9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="72" width="1056" height="486" rx="20" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>

  <text x="120" y="360" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="220" font-weight="700" letter-spacing="-6">E</text>
  <text x="318" y="360" fill="url(#accent)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="220" font-weight="700" letter-spacing="-6">K</text>

  <text x="120" y="442" fill="#a9afb8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="500">Edward King</text>
  <text x="120" y="492" fill="#7f8a97" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="400">Software Engineer</text>
</svg>
